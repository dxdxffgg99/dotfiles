general {
    lock_cmd = pidof hyprlock || ~/.config/hypr/whenlock.sh && hyprlock -c ~/.config/hypr/hyprlock.conf && ~/.config/hypr/whennotlock.sh
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

listener {
    timeout = 1800
    on-timeout = hyprlock -c ~/.config/hypr/hyprlock.conf
}
